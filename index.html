<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         BASIC META
    ========================== -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ShopTuch | Premium Online Shopping</title>

    <meta name="description"
          content="ShopTuch Premium Ecommerce Store. Discover trending products, flash sales, bundles, gift cards, electronics, fashion, home essentials and more.">

    <meta name="keywords"
          content="ShopTuch, Ecommerce, Online Shopping, Fashion, Electronics, Home, Beauty, Accessories">

    <meta name="author"
          content="ShopTuch">

    <meta name="robots"
          content="index, follow">

    <meta name="theme-color"
          content="#111827">

    <meta name="color-scheme"
          content="light dark">

    <!-- =========================
         CANONICAL
    ========================== -->

    <link rel="canonical"
          href="https://shoptuch.pages.dev/">

    <!-- =========================
         FAVICON
    ========================== -->

    <link rel="icon"
          type="image/png"
          href="assets/images/logo/favicon.png">

    <link rel="apple-touch-icon"
          href="assets/images/logo/apple-touch-icon.png">

    <!-- =========================
         OPEN GRAPH
    ========================== -->

    <meta property="og:type"
          content="website">

    <meta property="og:title"
          content="ShopTuch Premium Ecommerce">

    <meta property="og:description"
          content="Premium shopping experience with trending products and exclusive offers.">

    <meta property="og:image"
          content="assets/images/logo/og-image.jpg">

    <meta property="og:url"
          content="https://shoptuch.pages.dev">

    <meta property="og:site_name"
          content="ShopTuch">

    <!-- =========================
         TWITTER CARD
    ========================== -->

    <meta name="twitter:card"
          content="summary_large_image">

    <meta name="twitter:title"
          content="ShopTuch Premium Ecommerce">

    <meta name="twitter:description"
          content="Premium shopping experience with trending products.">

    <meta name="twitter:image"
          content="assets/images/logo/twitter-card.jpg">
    <!-- ==========================================
         JSON-LD STRUCTURED DATA
    =========================================== -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"OnlineStore",
      "name":"ShopTuch",
      "url":"https://shoptuch.pages.dev/",
      "logo":"https://shoptuch.pages.dev/assets/images/logo/logo.png",
      "image":"https://shoptuch.pages.dev/assets/images/logo/og-image.jpg",
      "description":"Premium online shopping store with trending products, fashion, electronics, home essentials and more.",
      "priceRange":"$$",
      "currenciesAccepted":"USD",
      "paymentAccepted":"Visa, MasterCard, PayPal",
      "email":"support@shoptuch.com"
    }
    </script>

    <!-- ==========================================
         GOOGLE FONTS
    =========================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <!-- ==========================================
         FONT AWESOME
    =========================================== -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ==========================================
         AOS ANIMATION
    =========================================== -->
    <link rel="stylesheet"
          href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- ==========================================
         SWIPER CSS
    =========================================== -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <!-- ==========================================
         MAIN CSS
    =========================================== -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================
         LOADING SCREEN
         (Part 2)
    =========================================== -->
<!-- =========================================================
     LOADING SCREEN
========================================================= -->

<div class="loader" id="loader">

    <div class="loader-content">

        <div class="loader-logo">

            <span>Shop</span><span>Tuch</span>

        </div>

        <div class="loader-spinner"></div>

        <p class="loader-text">

            Loading Premium Shopping Experience...

        </p>

    </div>

</div>
    <!-- ==========================================
         ANNOUNCEMENT BAR
         (Part 2)
    =========================================== -->

    <!-- ==========================================
         HEADER
         (Part 2)
    =========================================== -->

    <!-- ==========================================
         HERO SECTION
         (Part 3)
    =========================================== -->

    <!-- ==========================================
         MAIN CONTENT
    =========================================== -->

    <main id="main-content">

    </main>

    <!-- ==========================================
         FOOTER
         (Part 7)
    =========================================== -->

    <!-- ==========================================
         MODALS
         (Future Parts)
    =========================================== -->

    <!-- ==========================================
         JAVASCRIPT FILES
    =========================================== -->

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="script.js"></script>

</body>
</html>
